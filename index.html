<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiovisual Playground</title>
    <link rel="stylesheet" href="./src/styles/main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <!-- Original mode button -->
    <div id="mode-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"></path></svg>
        <div class="mode-dot" style="top:4px;left:22px;"></div>
        <div class="mode-dot" style="top:14px;left:40px;"></div>
        <div class="mode-dot" style="top:38px;left:34px;"></div>
        <div class="mode-dot" style="top:38px;left:10px;"></div>
        <div class="mode-dot" style="top:14px;left:4px;"></div>
    </div>
    <div id="icon-panel">
        <div class="icon-row" title="Fruit size — texture / note duration">
            <button class="icon-btn" id="btn-size-minus" title="Smaller (shorter notes)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <div class="icon-display"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="14" r="6"/><path d="M12 8v-2"/><path d="M14 6c1-1 3-1 3 0"/></svg></div>
            <button class="icon-btn" id="btn-size-plus" title="Larger (longer notes)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
        <div class="icon-row" title="Pattern length (n) — number of steps in the cycle">
            <button class="icon-btn" id="btn-n-minus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <div class="icon-display"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="12 2 22 20 2 20"/></svg></div>
            <button class="icon-btn" id="btn-n-plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
    </div>

    <!-- Floating reopen chip (only visible when panel is collapsed) -->
    <button id="camera-reopen" title="Show camera panel" aria-label="Show camera panel">📷</button>

    <!-- Camera panel -->
    <div id="camera-panel">
        <div class="panel-head">
            <div class="label">Camera Source</div>
            <button class="panel-collapse" id="camera-collapse" title="Hide camera panel" aria-label="Hide camera panel">−</button>
        </div>
        <select id="camera-select">
            <option value="off">Off — virtual fruits only</option>
            <option value="enable">Enable camera…</option>
        </select>
        <button class="iphone-btn" id="iphone-btn" title="Use iPhone via Continuity Camera">
            <span class="iphone-emoji">📱</span><span>Use iPhone</span>
        </button>
        <div class="cam-row">
            <label><input type="checkbox" id="mirror-toggle"> Mirror</label>
            <label style="margin-left:auto;"><input type="checkbox" id="silhouette-toggle" checked> Silhouette</label>
        </div>
        <video id="cam-preview" autoplay playsinline muted></video>
    </div>

    <!-- Hidden video for processing -->
    <video id="proc" autoplay playsinline muted style="position:absolute;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;"></video>

    <!-- Palette dock -->
    <div id="palette"></div>

    <!-- Drag ghost -->
    <div id="drag-ghost"></div>

    <!-- Toast -->
    <div id="toast"></div>
    <script src="./src/scripts/app.js" defer></script>
</body>
</html>
